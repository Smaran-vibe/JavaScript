<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .child {
        padding: 14px;
        background-color: aliceblue;
        border: 2px solid black;
        margin: 14px;
        cursor: pointer;

    }

    .childContainer {
        background-color: beige;
        padding: 14px;
        margin: 14px;
    }

    .container {
        background-color: rgb(248, 248, 81);
        padding: 14px;
        margin: 14px;
    }
</style>

<body>
    <div class="container">
        <section class="childContainer">
            <div class="child">
                I'm a child
            </div>
        </section>
    </div>
    <script>
        document.querySelector(".child").addEventListener("click", (e) => {
            e.stopPropagation();
            alert("Child is about to be hacked")
        })

        document.querySelector(".childContainer").addEventListener("click", (e) => {
            e.stopPropagation();
            alert("Are you sure you want to hack the child?")
        })

        document.querySelector(".container").addEventListener("click", (e) => {
            alert("Parent container something is wrong with the child")
        })
        function getRandomColor() {
            let val1 = Math.ceil(0 + Math.random() * 255); // a + r (b-a) a = 0 b = 255 r = random number between 0 and 1 
            let val2 = Math.ceil(0 + Math.random() * 255);
            let val3 = Math.ceil(0 + Math.random() * 255);

            return `rgb(${val1}, ${val2}, ${val3})`

        }

        let a = setInterval(() => {
            document.querySelector(".childContainer").style.background = getRandomColor();
        },2000);

        console.log(a);
        // clearInterval(a);

        let b = setTimeout(() => {
            document.querySelector(".childContainer").style.background = getRandomColor();
        },2000);

        console.log(b);
        
    </script>
</body>

</html>
